<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gathsession</title>
    <script type="module" src="/src/main.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav>
        <img src="./src/assets/GathSession..svg" alt="logotipo" />

        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Features</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">About Us</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <div class="izquierdo">
          <h1>Build your best community starting from here.</h1>
          <p>
            Meet and communicate with the best people to run projects, events or
            other activities in a more effective and fun way
          </p>

          <div class="botones">
            <button class="get">Get Started</button>
            <button class="learn">
              Learn More
              <span><img src="./src/assets/flecha.svg" alt="flecha" /></span>
            </button>
          </div>

          <div class="contenedor">
            <article class="build">
              <a href="#">
                <span><img src="./src/assets/build.svg" alt="build" /></span>
                <p>Build Community</p>
              </a>
            </article>

            <article class="share">
              <a href="#">
                <span
                  ><img src="./src/assets/calendario.svg" alt="calendario"
                /></span>
                <p>Share Events</p>
              </a>
            </article>

            <article class="get_informacion">
              <a href="#">
                <span><img src="./src/assets/informacion.svg" alt="" /></span>
                <p>Get Information</p>
              </a>
            </article>
          </div>
        </div>

        <div class="derecho">
          <div class="imagenes">
            <img
              class="chico-morado"
              src="./src/assets/chico_morado.png"
              alt="morado"
            />
            <img
              class="chica-azul"
              src="./src/assets/chica_azul.png"
              alt="azul"
            />
            <img
              class="chica-rosa"
              src="./src/assets/chica_rosa.png"
              alt="rosa"
            />
            <img
              class="chico-naranja"
              src="./src/assets/chico_naranja.png"
              alt="naranja"
            />
            <img
              class="chica-amarillo"
              src="./src/assets/chica_amarillo.png"
              alt="amarillo"
            />
          </div>
          <img src="./src/assets/elipse.svg" alt="elipse" class="elipse" />
        </div>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
